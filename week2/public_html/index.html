<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Random Quote Display</title>
  </head>
  <body>
    <h1>Random Quote API Demo</h1>
    <p>Click the button below to get a random quote from the server:</p>
    <button id="fetchQuoteBtn">Get Quote</button>
    <p id="quoteDisplay"></p>

    <h1>Square Calculator</h1>
    <form action="/square" method="GET">
      <label for="num">Enter a number:</label>
      <input type="text" id="num" name="num" required />
      <button type="submit">Calculate Square</button>
    </form>

    <h1>Sum Calculator</h1>
    <form action="/sum" method="GET">
      <label for="a">Enter first number:</label>
      <input type="text" id="a" name="a" required />
      <label for="b">Enter second number:</label>
      <input type="text" id="b" name="b" required />
      <button type="submit">Calculate Sum</button>
    </form>

    <script>
      // Attach an event listener to the button
      document
        .getElementById("fetchQuoteBtn")
        .addEventListener("click", function () {
          // Make a GET request to your API endpoint
          fetch("/api/quote")
            .then((response) => response.json())
            .then((data) => {
              // Display the fetched quote in the page
              document.getElementById("quoteDisplay").innerText = data.quote;
            })
            .catch((error) => {
              console.error("Error fetching quote:", error);
              document.getElementById("quoteDisplay").innerText =
                "Error fetching quote.";
            });
        });
    </script>
  </body>
</html>
